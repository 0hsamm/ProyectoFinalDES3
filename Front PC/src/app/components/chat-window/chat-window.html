<div class="chat-window">

  <div class="chat-topbar">

    <div class="user-info">

      <div class="avatar">
        V
      </div>

      <div class="texts">

        <div class="name">
          Valentina García
        </div>

        <div class="status">
          En línea
        </div>

      </div>

    </div>

    <div class="actions">

      <div class="action-btn">
        📞
      </div>

      <div class="action-btn">
        🎥
      </div>

      <div class="action-btn">
        🔍
      </div>

    </div>

  </div>

  <div class="messages-container">

    <div class="message other">

      <div class="message-content">
        Hola 👋
      </div>

      <div class="time">
        10:28 AM
      </div>

    </div>

    <div class="message me">

      <div class="message-content">
        Hola Vale 😄
      </div>

      <div class="time">
        10:29 AM
      </div>

    </div>

    <div class="message me">

      <div class="message-content">
        Ya casi terminamos Reload 🔥
      </div>

      <div class="time">
        10:30 AM
      </div>

    </div>

  </div>

  <div class="message-input-container">

    <div class="input-actions">

      <div class="input-btn">
        ➕
      </div>

    </div>

    <input
      type="text"
      placeholder="Escribe un mensaje..."
    >

    <div class="right-actions">

      <div class="input-btn">
        😊
      </div>

      <div class="input-btn">
        🎤
      </div>

      <button class="send-btn">
        ➤
      </button>

    </div>

  </div>

</div>
