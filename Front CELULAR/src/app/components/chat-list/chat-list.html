<div class="chat-list">

  <div class="chat-header">

    <h2>Conversaciones</h2>

    <div class="search-box">

      <span class="search-icon"></span>

      <input
        type="text"
        placeholder="Buscar conversacion"
        [(ngModel)]="filtro"
      >

    </div>

  </div>

  <div
    class="state"
    *ngIf="cargando"
  >
    <i class="pi pi-spin pi-spinner"></i>
    Cargando conversaciones...
  </div>

  <div
    class="state error"
    *ngIf="!cargando && error != ''"
  >
    {{ error }}
  </div>

  <div
    class="chat-items"
    *ngIf="!cargando && error == ''"
  >

    <button
      class="chat-item"
      type="button"
      *ngFor="let conversacion of obtenerConversacionesFiltradas()"
      [class.active]="estaSeleccionada(conversacion)"
      (click)="seleccionarConversacion(conversacion)"
    >

      <div class="avatar">
        <img
          *ngIf="obtenerFotoConversacion(conversacion)"
          [src]="obtenerFotoConversacion(conversacion)"
          [alt]="obtenerNombre(conversacion)"
        >
        <span *ngIf="!obtenerFotoConversacion(conversacion)">
          {{ obtenerIniciales(conversacion) }}
        </span>
      </div>

      <div class="chat-info">

        <div class="name">
          {{ obtenerNombre(conversacion) }}
        </div>

        <div class="message">
          {{ obtenerUltimoMensaje(conversacion) }}
        </div>

      </div>

    </button>

    <div
      class="state"
      *ngIf="obtenerConversacionesFiltradas().length == 0"
    >
      No hay conversaciones para mostrar
    </div>

  </div>

</div>
