<div class="verify-page">

  <div class="verify-card">

    <div
      class="status-circle"
      [class.success]="correcto"
      [class.error-circle]="!correcto && !cargando"
    >

      <span *ngIf="cargando">
        ...
      </span>

      <span *ngIf="correcto">
        ✓
      </span>

      <span *ngIf="!correcto && !cargando">
        ✕
      </span>

    </div>

    <h1>

      <span *ngIf="cargando">
        Verificando...
      </span>

      <span *ngIf="correcto">
        Cuenta verificada
      </span>

      <span *ngIf="!correcto && !cargando">
        Error de verificación
      </span>

    </h1>

    <p>
      {{ mensaje }}
    </p>

  </div>

</div>
